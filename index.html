<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learneasy Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .page { display: none; min-height: 100vh; animation: fadeIn 0.3s ease; }
        .active-page { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="home-page" class="page active-page">
    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b p-4 flex justify-between items-center px-6">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 text-white p-2 rounded-xl shadow-lg shadow-blue-200"><i class="fa-solid fa-graduation-cap"></i></div>
            <h1 class="font-extrabold text-blue-900 tracking-tighter">LEARNEASY</h1>
        </div>
        <button id="logout-btn" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-right-from-bracket"></i></button>
    </header>

    <main class="max-w-4xl mx-auto w-full p-4 space-y-6">
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-[32px] p-8 text-white shadow-xl">
            <h2 class="text-2xl font-800 mb-2">Xush kelibsiz!</h2>
            <p class="text-blue-100 text-sm leading-relaxed">Learneasy.uz — bu 33-maktab o'quvchilari uchun maxsus yaratilgan AI platforma.</p>
            <button onclick="showPage('ai-page')" class="mt-6 bg-white text-blue-600 px-6 py-3 rounded-2xl font-bold text-sm shadow-lg hover:scale-105 transition-all">
                AI AGENTGA O'TISH <i class="fa-solid fa-arrow-right ml-2"></i>
            </button>
        </div>
        
        <div class="bg-white rounded-[32px] border border-slate-200 overflow-hidden shadow-sm">
            <div class="p-5 border-b"><span class="font-bold text-slate-800 uppercase text-xs tracking-widest"><i class="fa-brands fa-instagram text-pink-500 mr-2"></i>Yangiliklar</span></div>
            <div class="p-2"><blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/margilon_33_maktab/" data-instgrm-version="14"></blockquote></div>
        </div>
    </main>
</div>

<div id="ai-page" class="page">
    <header class="bg-white border-b p-4 flex justify-between items-center px-6 sticky top-0 z-50">
        <button onclick="showPage('premium-page')" class="bg-gradient-to-r from-yellow-400 to-orange-500 text-white text-[10px] font-black px-5 py-2 rounded-full shadow-md">PREMIUM 💎</button>
        <button onclick="showPage('home-page')" class="text-slate-700 text-2xl"><i class="fa-solid fa-house-chimney"></i></button>
    </header>

    <div class="flex-1 overflow-y-auto p-4 space-y-4 max-w-2xl mx-auto w-full" id="chat-flow">
        <div class="flex gap-3">
            <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600 text-xs"><i class="fa-solid fa-robot"></i></div>
            <div class="bg-white p-4 rounded-2xl rounded-tl-none text-sm text-slate-700 shadow-sm border border-slate-100">
                Salom! Men Learneasy AI yordamchisiman. Savolingizni bering.
            </div>
        </div>
    </div>

    <div class="p-4 bg-white border-t sticky bottom-0">
        <div class="max-w-2xl mx-auto flex gap-2">
            <input id="user-input" type="text" placeholder="Savol yozing..." class="flex-1 bg-slate-100 border-none p-4 rounded-2xl outline-none text-sm">
            <button id="send-btn" class="bg-blue-600 text-white w-14 h-14 rounded-2xl shadow-lg flex items-center justify-center">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<div id="premium-page" class="page">
    <header class="p-6">
        <button onclick="showPage('ai-page')" class="text-slate-400 text-2xl"><i class="fa-solid fa-xmark"></i></button>
    </header>
    <main class="flex-1 flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-[40px] p-8 shadow-2xl text-center">
            <h2 class="text-3xl font-800 text-slate-800">Premium Pro</h2>
            <p class="text-slate-400 text-sm mt-3">Oyiga 15,000 so'm.</p>
            <button id="pay-confirm" class="w-full bg-blue-600 text-white py-5 rounded-[24px] font-extrabold mt-8">TO'LOV QILISH</button>
        </div>
    </main>
</div>

<script async src="//www.instagram.com/embed.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWEmiUblBJSk4_oY4EkPDWh1wtMRXyfo4",
        authDomain: "learneasy-social.firebaseapp.com",
        projectId: "learneasy-social",
        appId: "1:409211768065:web:6a35c2e9a5a8ded0e05f00"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // SAHIFA ALMASHISH
    window.showPage = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        const target = document.getElementById(id);
        if(target) target.classList.add('active-page');
    };

    // AI FUNKSIYASI (OpenRouter)
    async function callOpenRouterAI(userMessage) {
        // DIQQAT: API KEYNI SHU YERGA QO'YGANMAN
        const API_KEY = "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"; 

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json",
                    "HTTP-Referer": "https://learneasy.uz"
                },
                body: JSON.stringify({
                    "model": "google/gemma-2-9b-it:free", 
                    "messages": [
                        { "role": "system", "content": "Sen 33-maktab AI yordamchisisan. O'zbekcha javob ber." },
                        { "role": "user", "content": userMessage }
                    ]
                })
            });
            const data = await response.json();
            return data.choices[0].message.content;
        } catch (error) {
            console.error("AI Xatosi:", error);
            return "Ulanishda xato bo'ldi.";
        }
    }

    // CHAT MANTIQI
    const chatInput = document.getElementById('user-input');
    const chatFlow = document.getElementById('chat-flow');
    const sendBtn = document.getElementById('send-btn');

    async function handleMessage() {
        const msg = chatInput.value.trim();
        if(!msg) return;

        // Foydalanuvchi xabari
        chatFlow.innerHTML += `<div class="flex justify-end"><div class="bg-blue-600 text-white p-4 rounded-2xl rounded-tr-none text-sm max-w-[85%] shadow-md">${msg}</div></div>`;
        chatInput.value = "";
        chatFlow.scrollTop = chatFlow.scrollHeight;

        // AI javobi
        const reply = await callOpenRouterAI(msg);
        chatFlow.innerHTML += `<div class="flex gap-3"><div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600 text-xs shadow-sm"><i class="fa-solid fa-robot"></i></div><div class="bg-white p-4 rounded-2xl rounded-tl-none text-sm text-slate-700 max-w-[85%] border border-slate-200 shadow-sm">${reply}</div></div>`;
        chatFlow.scrollTop = chatFlow.scrollHeight;
    }

    if(sendBtn) sendBtn.onclick = handleMessage;

    // PREMIUM VA LOGOUT
    document.getElementById('pay-confirm').onclick = async () => {
        if(auth.currentUser) {
            await updateDoc(doc(db, "users", auth.currentUser.uid), { isPremium: true });
            alert("Premium yoqildi!");
            showPage('ai-page');
        }
    };
    document.getElementById('logout-btn').onclick = () => signOut(auth);
</script>

</body>
</html>
