<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learneasy - Dual Panel Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; overflow: hidden; }
        /* Panellar balandligi */
        .main-height { height: calc(100vh - 76px); }
        .panel-card { background: white; border-radius: 32px; border: 1px solid #e2e8f0; height: 100%; overflow: hidden; display: flex; flex-col; }
        .chat-area { flex-grow: 1; overflow-y: auto; padding: 1.5rem; }
        .insta-area { flex-grow: 1; overflow-y: auto; padding: 0.5rem; }
        /* Scrollbar dizayni */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col">

<header class="bg-white border-b p-4 flex justify-between items-center px-8 shadow-sm relative z-50">
    <div class="flex items-center gap-3">
        <div class="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center font-bold text-xl shadow-lg">LE</div>
        <div>
            <h1 class="font-black italic text-blue-800 text-lg leading-none">LEARNEASY</h1>
            <p class="text-[9px] text-gray-400 font-bold tracking-widest uppercase">33-Maktab AI Yordamchisi</p>
        </div>
    </div>
    <div class="flex items-center gap-4">
        <div id="status-badge" class="bg-slate-100 text-[10px] px-3 py-1 rounded-full font-bold text-slate-500 uppercase">Yuklanmoqda...</div>
        <button id="premium-btn" class="hidden bg-gradient-to-r from-yellow-400 to-orange-500 text-white text-[10px] font-black px-5 py-2.5 rounded-xl shadow-md hover:scale-105 transition-all">PREMIUM 💎</button>
        <button id="logout-btn" class="w-10 h-10 rounded-xl hover:bg-red-50 text-gray-400 hover:text-red-500 transition-all border border-slate-100">
            <i class="fa-solid fa-right-from-bracket"></i>
        </button>
    </div>
</header>

<main class="main-height p-4 flex flex-col lg:flex-row gap-6">
    
    <section class="flex-1 min-h-0">
        <div class="panel-card shadow-sm">
            <div class="p-5 border-b bg-white flex justify-between items-center sticky top-0 z-10">
                <h2 class="font-black text-slate-700 text-sm tracking-widest uppercase"><i class="fa-brands fa-instagram text-pink-500 mr-2 text-lg"></i>Maktab Hayoti</h2>
                <a href="https://instagram.com/margilon_33_maktab" target="_blank" class="text-[11px] text-blue-500 font-bold hover:underline">@margilon_33_maktab</a>
            </div>
            <div class="insta-area">
                <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/margilon_33_maktab/" data-instgrm-version="14" style="width:100% !important; margin:0 !important; border-radius: 20px !important;"></blockquote>
                <script async src="//www.instagram.com/embed.js"></script>
            </div>
        </div>
    </section>

    <section class="flex-1 min-h-0">
        <div class="panel-card shadow-xl border-blue-100">
            <div class="p-5 border-b bg-white flex justify-between items-center">
                <h2 class="font-black text-blue-700 text-sm tracking-widest uppercase"><i class="fa-solid fa-robot mr-2"></i>AI O'qituvchi</h2>
                <span id="limit-text" class="text-[10px] bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-bold">Limit: 8/8</span>
            </div>
            
            <div id="chat-flow" class="chat-area space-y-4 bg-slate-50/50">
                <div class="flex gap-3">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white text-xs shadow-md"><i class="fa-solid fa-robot"></i></div>
                    <div class="bg-white p-4 rounded-2xl rounded-tl-none text-sm text-slate-700 max-w-[85%] shadow-sm border border-slate-100">
                        Assalomu alaykum! Men **Learneasy** AI yordamchisiman. Bugun sizga nima yordam bera olaman?
                    </div>
                </div>
            </div>
            
            <div class="p-5 border-t bg-white">
                <div class="flex gap-3 bg-slate-100 p-2 rounded-2xl border border-slate-200 focus-within:border-blue-500 focus-within:bg-white transition-all">
                    <input id="user-input" type="text" placeholder="Savol yozing..." class="flex-1 bg-transparent border-none px-4 outline-none text-sm text-slate-700">
                    <button id="send-btn" class="bg-blue-600 text-white w-12 h-12 rounded-xl hover:bg-blue-700 active:scale-90 transition-all shadow-lg shadow-blue-200">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </section>
</main>

<div id="payment-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-4">
    <div class="bg-white max-w-sm w-full rounded-[40px] p-8 shadow-2xl">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl shadow-inner"><i class="fa-solid fa-credit-card"></i></div>
            <h2 class="text-2xl font-black text-slate-800">Premium Obuna</h2>
            <p class="text-slate-400 text-[10px] mt-2 uppercase font-bold tracking-widest">15,000 UZS / HAR OY</p>
        </div>
        <div class="space-y-4">
            <input id="card-num" type="text" placeholder="8600 0000 0000 0000" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 font-mono text-lg transition-all" maxlength="19">
            <div class="flex gap-4">
                <input id="card-date" type="text" placeholder="MM/YY" class="w-1/2 p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 text-center font-mono" maxlength="5">
                <input id="card-cvv" type="password" placeholder="***" class="w-1/2 p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 text-center" maxlength="3">
            </div>
        </div>
        <button id="subscribe-confirm" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold mt-8 shadow-xl shadow-blue-200 hover:bg-blue-700 transition-all">AVTOMATIK OBUNA</button>
        <button onclick="document.getElementById('payment-modal').classList.add('hidden')" class="w-full text-slate-400 text-[10px] mt-4 font-black uppercase tracking-widest">Hozir emas</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWEmiUblBJSk4_oY4EkPDWh1wtMRXyfo4",
        authDomain: "learneasy-social.firebaseapp.com",
        projectId: "learneasy-social",
        storageBucket: "learneasy-social.firebasestorage.app",
        messagingSenderId: "409211768065",
        appId: "1:409211768065:web:6a35c2e9a5a8ded0e05f00"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isPremium = false;
    let limit = 8;

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = "auth/login.html";
        } else {
            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);
            if (snap.exists()) {
                const data = snap.data();
                isPremium = data.isPremium || false;
                limit = isPremium ? 999 : (data.limit ?? 8);
            } else {
                await setDoc(userRef, { email: user.email, isPremium: false, limit: 8 });
            }
            updateUI();
        }
    });

    function updateUI() {
        document.getElementById('status-badge').innerText = isPremium ? "PREMIUM PRO" : "FREE USER";
        document.getElementById('status-badge').className = isPremium ? "bg-blue-600 text-white text-[10px] px-3 py-1 rounded-full font-black uppercase" : "bg-slate-100 text-[10px] px-3 py-1 rounded-full font-bold text-slate-500 uppercase";
        if (isPremium) document.getElementById('premium-btn').classList.add('hidden');
        else document.getElementById('premium-btn').classList.remove('hidden');
        document.getElementById('limit-text').innerText = isPremium ? "Limit: ∞" : `Limit: ${limit}/8`;
    }

    document.getElementById('premium-btn').onclick = () => document.getElementById('payment-modal').classList.remove('hidden');
    
    document.getElementById('subscribe-confirm').onclick = async () => {
        const user = auth.currentUser;
        await updateDoc(doc(db, "users", user.uid), { isPremium: true, autoRenew: true });
        alert("PRO obuna faollashdi!");
        location.reload();
    };

    async function askAI() {
        const input = document.getElementById('user-input');
        const flow = document.getElementById('chat-flow');
        const msg = input.value.trim();
        if(!msg || (limit <= 0 && !isPremium)) return;

        flow.innerHTML += `<div class="flex justify-end"><div class="bg-blue-600 text-white p-4 rounded-2xl rounded-tr-none text-sm max-w-[85%] shadow-md">${msg}</div></div>`;
        input.value = "";
        flow.scrollTop = flow.scrollHeight;

        try {
            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { 
                    "Authorization": "Bearer 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", 
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({
                    model: "google/gemma-2-9b-it:free",
                    messages: [{role: "system", content: "Sen 33-maktab yordamchisisan. O'zbekcha javob ber."}, {role: "user", content: msg}]
                })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            
            flow.innerHTML += `<div class="flex gap-3"><div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600 text-xs shadow-sm"><i class="fa-solid fa-robot"></i></div><div class="bg-white p-4 rounded-2xl rounded-tl-none text-sm text-slate-700 max-w-[85%] shadow-sm border border-slate-100">${reply}</div></div>`;
            
            if(!isPremium) {
                limit--;
                await updateDoc(doc(db, "users", auth.currentUser.uid), { limit: limit });
            }
            updateUI();
            flow.scrollTop = flow.scrollHeight;
        } catch (e) { console.error(e); }
    }

    document.getElementById('send-btn').onclick = askAI;
    document.getElementById('user-input').onkeydown = (e) => { if(e.key === 'Enter') askAI(); };
    document.getElementById('logout-btn').onclick = () => signOut(auth);
</script>

</body>
</html>
